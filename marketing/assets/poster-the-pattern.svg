<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- Trend line / chart icon -->
  <g transform="translate(260,95)">
    <!-- Axis -->
    <line x1="10" y1="90" x2="110" y2="90" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <line x1="10" y1="10" x2="10" y2="90" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- Data line -->
    <polyline points="15,75 35,60 55,65 75,40 95,25 105,30" fill="none" stroke="#d69e2e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Data dots -->
    <circle cx="15" cy="75" r="3" fill="#d69e2e"/>
    <circle cx="35" cy="60" r="3" fill="#d69e2e"/>
    <circle cx="55" cy="65" r="3" fill="#d69e2e"/>
    <circle cx="75" cy="40" r="3" fill="#d69e2e"/>
    <circle cx="95" cy="25" r="3" fill="#d69e2e"/>
    <circle cx="105" cy="30" r="3" fill="#d69e2e"/>
  </g>
  <!-- Play button -->
  <circle cx="320" cy="180" r="32" fill="rgba(214,158,46,0.9)"/>
  <polygon points="312,164 312,196 340,180" fill="white"/>
  <!-- Label -->
  <text x="320" y="290" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="500">The Pattern</text>
</svg>
